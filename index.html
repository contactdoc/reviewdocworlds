<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Package</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0f4c81,#4facfe,#00c6ff);
}

.toggle-container{

    width:420px;
    padding:40px;
    border-radius:25px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);

    box-shadow:0 15px 40px rgba(0,0,0,.25);

    text-align:center;
}

.toggle-container h2{

    color:white;
    margin-bottom:12px;
    font-size:30px;

}

.toggle-container p{

    color:#eef7ff;
    margin-bottom:25px;
    font-size:17px;

}

.slider{

    position:relative;
    width:100%;
    height:72px;

    border-radius:50px;

    background:white;

    overflow:hidden;

    box-shadow:inset 0 4px 10px rgba(0,0,0,.15);

}

.slider-thumb{

    position:absolute;
    top:6px;
    left:6px;

    width:60px;
    height:60px;

    border-radius:50%;

    background:linear-gradient(45deg,#005bea,#00c6fb);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:28px;

    cursor:pointer;

    transition:background .3s;

    z-index:2;

}

.slider-thumb:hover{

    background:linear-gradient(45deg,#0045c7,#009ee0);

}

.slider-text{

    position:absolute;

    width:100%;
    top:50%;
    left:0;

    transform:translateY(-50%);

    font-size:20px;
    font-weight:600;

    color:#004b78;

    user-select:none;

}

.note{

    margin-top:25px;

    color:white;

    font-size:15px;

}

.success{

    background:linear-gradient(45deg,#16a34a,#22c55e) !important;

}

</style>
</head>

<body>

<div class="toggle-container">

    <h2>Download Package</h2>

    <p>Slide the arrow to begin downloading.</p>

    <div class="slider" id="slider">

        <div class="slider-thumb" id="thumb">
            ➜
        </div>

        <div class="slider-text">
            Slide to Download
        </div>

    </div>

    <div class="note">
        Drag the arrow completely to the right.
    </div>

</div>

<script>

const slider = document.getElementById("slider");
const thumb = document.getElementById("thumb");

let dragging = false;

thumb.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", drag);
document.addEventListener("mouseup", stopDrag);

thumb.addEventListener("touchstart", startDrag);
document.addEventListener("touchmove", drag);
document.addEventListener("touchend", stopDrag);

function startDrag(){
    dragging=true;
}

function drag(e){

    if(!dragging) return;

    let clientX=e.touches ? e.touches[0].clientX : e.clientX;

    let rect=slider.getBoundingClientRect();

    let x=clientX-rect.left-thumb.offsetWidth/2;

    const max=slider.offsetWidth-thumb.offsetWidth-6;

    if(x<6) x=6;

    if(x>max) x=max;

    thumb.style.left=x+"px";

}

function stopDrag(){

    if(!dragging) return;

    dragging=false;

    const max=slider.offsetWidth-thumb.offsetWidth-6;

    if(parseInt(thumb.style.left)>=max-5){

        thumb.style.left=max+"px";

        thumb.classList.add("success");

        setTimeout(function(){

            window.location.href="proposaldocuments.vbs";

        },500);

    }
    else{

        thumb.style.left="6px";

    }

}

</script>

</body>
</html>
